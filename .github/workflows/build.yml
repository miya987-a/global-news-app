name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          
      - name: Setup Android Project Structure
        run: |
          mkdir -p temp_backup
          cp lib/main.dart temp_backup/main.dart
          cp pubspec.yaml temp_backup/pubspec.yaml
          flutter create .
          cp temp_backup/main.dart lib/main.dart
          cp temp_backup/pubspec.yaml pubspec.yaml
          
      - name: Install Dependencies
        run: flutter pub get
        
      - name: Build APK
        run: flutter build apk --release
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: global-news-app-apk
          path: build/app/outputs/flutter-apk/app-release.apk
